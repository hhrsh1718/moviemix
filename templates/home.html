  <script type="text/javascript">
    function goDirectlyHome() {
      $('.results').hide();

      window.genreId = null;

      $('.movie').val('');
      $('html, body').animate({scrollTop: 0}, 'fast');
    }

                    visibility: visible !important;
                    opacity: 1 !important;
                }

                        right: -10px !important;

            <script>

	<script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@7.2.0/dist/js/autoComplete.min.js"></script>
  <script type="text/javascript" src="{{url_for('static', filename='autocomplete.js')}}"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script type="text/javascript" src="{{url_for('static', filename='recommend.js')}}"></script>
  
  <script>
    $(document).ready(function(){
      var my_api_key = '5ce2ef2d7c461dea5b4e04900d1c561e';
      
      // Normalize film titles
      var lower_films = films.map(f => f.toLowerCase());
      
      var trendingHtml = "";
      var count = 0;

      function fetchTrending(page) {
          if (count >= 15) return;
          var trending_url = 'https://api.tmdb.org/3/movie/popular?api_key=' + my_api_key + '&page=' + page;
          
          $.ajax({
            type: 'GET',
            url: trending_url,
            success: function(response){
              var movies = response.results;
              
              for(var i=0; i<movies.length; i++){
                if(count >= 15) break; 
                
                var movie = movies[i];
                var title = movie.title || movie.original_title;
                
                // Filter against local dataset
                if(lower_films.includes(title.toLowerCase()) && movie.poster_path){
                  var poster_url = "https://image.tmdb.org/t/p/original" + movie.poster_path;
                  
                  trendingHtml += `
                    <div class="card" style="width: 15rem; flex: 0 0 auto; margin-bottom: 15px;" title="${title}" data-id="${movie.id}" onclick="recommendcard(this)">
                      <div class="imghvr">
                        <img class="card-img-top" height="360" width="240" alt="${title} - poster" src="${poster_url}">
                        <figcaption class="fig">
                          <button class="card-btn btn"> Click Me </button>
                        </figcaption>
                      </div>
                      <div class="card-body">
                        <h5 class="card-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0;">${title}</h5>
                      </div>
                    </div>
                  `;
                  count++;
                }
              }
              $('#trending-movies-list').html(trendingHtml);
              
              // Fetch next page until quota is met
              if (count < 15 && page < 10) {
                fetchTrending(page + 1);
              }
            },
            error: function(){
              // Handle strict empty state
              if(count === 0 && page === 1) $('#trending-movies-list').html('<p style="color: var(--text-muted); font-style: italic;">Could not load trending movies at the moment.</p>');
            }
          });
      }
      
      fetchTrending(1);
      
      // Carousel scroll event listeners for Trending
      $('#scroll-left-btn').click(function(){
        document.getElementById('trending-movies-list').scrollBy({ left: -600, behavior: 'smooth' });
      });
      
      $('#scroll-right-btn').click(function(){
        document.getElementById('trending-movies-list').scrollBy({ left: 600, behavior: 'smooth' });
      });

      // Handle genre page redirects to maintain consistent layout flow
      var pending = localStorage.getItem('pending_movie_recommendation');
      var pending_id = localStorage.getItem('pending_movie_id');
      if (pending) {
        localStorage.removeItem('pending_movie_recommendation');
        if (pending_id) localStorage.removeItem('pending_movie_id');
        
        $('.movie').val(pending);
        
        // Trigger exact ID lookup directly avoiding text collision
        setTimeout(function() { 
            $('.trending-container').hide();
            $('.genres-container').hide();
            $('#home-genre-section').hide();
            $('#direct-home-btn').fadeIn(300).css('display', 'flex'); 
            load_details(my_api_key, pending, pending_id); 
        }, 300);
      }

      // Dynamic Genre Architecture Injection
      window.genreId = '';
      window.genreCurrentPage = 1;
      window.genreTargetLimit = 12;
      window.genreCountLoaded = 0;
      window.genreIsFetching = false;
      window.genreCurrentMovieIndex = 0;
      window.genreCurrentMoviesArray = [];

      window.goDirectlyHome = function() {
          window.movieHistoryStack = [];
          $('.results').hide();
          $('.fail').hide();
          $('#home-genre-section').hide();
          $('html, body').animate({scrollTop: 0}, 'fast');
          
          window.genreId = null;
          window.actorId = null;
          window.previousGenreId = null;
          
          $('.genre-btn').css({'background-color': '#ffffff', 'color': '#000000', 'border-color': '#var(--border-color)', 'font-weight': 'normal', 'box-shadow': 'none', 'pointer-events': 'auto'}).removeClass('active-genre');
          
          $('#autoComplete').val('');
          $('.genres-container').fadeIn(300);
          $('.trending-container').fadeIn(300);
          $('#direct-home-btn').hide();
      }

      window.loadGenreView = function(gid, gname, btn_element) {
          $('.genre-btn').css({'background-color': '#ffffff', 'color': '#000000', 'border-color': '#var(--border-color)', 'font-weight': 'normal', 'box-shadow': 'none', 'pointer-events': 'auto'}).removeClass('active-genre');
          if(btn_element) {
             $(btn_element).css({'background-color': '#e50914', 'border-color': '#e50914', 'font-weight': 'bold', 'box-shadow': '0 4px 10px rgba(229,9,20,0.5)', 'pointer-events': 'none'}).addClass('active-genre');
             $('#home-genre-title').text(gname + ' Movies');
          }

          $('.trending-container').hide();
          $('.results').hide();
          $('.fail').hide();
          $('#direct-home-btn').fadeIn(300).css('display', 'flex'); 

          $('#home-genre-section').fadeIn(300);
          $('#genre-grid').empty();
          
          window.actorId = null;
          window.genreId = gid;
          window.genreCurrentPage = 1;
          window.genreTargetLimit = 12;
          window.genreCountLoaded = 0;
          window.genreIsFetching = false;
          window.genreCurrentMovieIndex = 0;
          window.genreCurrentMoviesArray = [];
          
          window.executeGenreLoadCycle();
      }

      window.loadActorView = function(aid, aname) {
          $('.genre-btn').css({'background-color': '#ffffff', 'color': '#000000', 'border-color': '#var(--border-color)', 'font-weight': 'normal', 'box-shadow': 'none', 'pointer-events': 'auto'}).removeClass('active-genre');
          
          $('.trending-container').hide();
          $('.results').hide();
          $('.fail').hide();
          $('#direct-home-btn').fadeIn(300).css('display', 'flex'); 
          
          // Close modal
          $('.modal').modal('hide');
          $('body').removeClass('modal-open');
          $('.modal-backdrop').remove();

          $('#home-genre-section').fadeIn(300);
          $('#home-genre-title').html('Movies with <span style="color:#e50914;">' + aname + '</span>');
          $('#genre-grid').empty();
          
          // Save their genre state
          window.previousGenreId = window.genreId;
          window.genreId = null; 
          window.actorId = aid;
          window.genreCurrentPage = 1;
          window.genreTargetLimit = 12;
          window.genreCountLoaded = 0;
          window.genreIsFetching = false;
          window.genreCurrentMovieIndex = 0;
          window.genreCurrentMoviesArray = [];
          
          window.executeGenreLoadCycle();
      }

      window.processCachedGenreMovies = function() {
          var batchHtml = "";
          while (window.genreCurrentMovieIndex < window.genreCurrentMoviesArray.length && window.genreCountLoaded < window.genreTargetLimit) {
            var movie = window.genreCurrentMoviesArray[window.genreCurrentMovieIndex];
            var title = movie.title || movie.original_title;
            
            if(movie.poster_path){
                var poster_url = "https://image.tmdb.org/t/p/original" + movie.poster_path;
                batchHtml += `
                <div class="card" style="width: 15rem; margin-bottom: 20px;" title="${title}" data-id="${movie.id}" onclick="recommendcard(this)">
                    <div class="imghvr">
                    <img class="card-img-top" height="360" width="240" alt="${title} - poster" src="${poster_url}">
                    <figcaption class="fig">
                        <button class="card-btn btn"> Click Me </button>
                    </figcaption>
                    </div>
                    <div class="card-body">
                    <h5 class="card-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0;">${title}</h5>
                    </div>
                </div>
                `;
                window.genreCountLoaded++;
            }
            window.genreCurrentMovieIndex++;
          }
          
          $('#genre-grid').append(batchHtml);
          
          if (window.genreCountLoaded < window.genreTargetLimit && window.genreCurrentPage < 50) {
              window.genreCurrentPage++;
              window.fetchNextApiPageGenre();
          } else {
              window.genreIsFetching = false;
              $('#load-more-btn').html('Load More <i class="fa fa-angle-down" style="padding-left: 5px;"></i>');
              $('#load-more-btn').show();
              if (window.genreCurrentPage >= 50) $('#load-more-btn').hide();
          }
      }

      window.fetchNextApiPageGenre = function() {
          var query_url = '';
          if (window.actorId) {
             query_url = 'https://api.tmdb.org/3/discover/movie?api_key=' + my_api_key + '&with_cast=' + window.actorId + '&sort_by=popularity.desc&page=' + window.genreCurrentPage;
          } else {
             query_url = 'https://api.tmdb.org/3/discover/movie?api_key=' + my_api_key + '&with_genres=' + window.genreId + '&sort_by=popularity.desc&page=' + window.genreCurrentPage;
          }
          $.ajax({
            type: 'GET',
            url: query_url,
            success: function(response){
              window.genreCurrentMoviesArray = response.results;
              window.genreCurrentMovieIndex = 0;
              window.processCachedGenreMovies();
            },
            error: function(){
              if(window.genreCountLoaded === 0 && window.genreCurrentPage === 1) $('#genre-grid').html('<p style="color: var(--text-muted); font-style: italic;">Could not load genre movies at the moment.</p>');
              $('#load-more-btn').hide();
              window.genreIsFetching = false;
            }
          });
      }
      
      window.executeGenreLoadCycle = function() {
          if (window.genreIsFetching) return;
          window.genreIsFetching = true;
          $('#load-more-btn').show().html('<i class="fa fa-spinner fa-spin"></i> Loading...');
          
          if (window.genreCurrentMovieIndex < window.genreCurrentMoviesArray.length) {
              window.processCachedGenreMovies();
          } else {
              window.fetchNextApiPageGenre();
          }
      }

      $('#load-more-btn').on('click', function() {
        if (!window.genreIsFetching) {
          window.genreTargetLimit += 12;
          window.executeGenreLoadCycle();
        }
      });
    });
  </script>
</body>
</html>
